<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emicil Admin — Connexion</title>
  <base href="/admin/" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-login-page">

  <div class="login-card">
    <div class="login-logo">Emicil</div>
    <p class="login-subtitle">Espace Administration</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="admin@emicil.fr" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrap">
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
          <button type="button" id="toggle-pw" class="toggle-pw" aria-label="Afficher le mot de passe">
            <svg id="eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-hide" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <p class="error-msg hidden" id="error-msg"></p>
      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-text">Se connecter</span>
        <span id="btn-loader" class="hidden">Connexion…</span>
      </button>
    </form>

    <a href="../index.html" class="back-link">← Retour au site</a>
  </div>

  <script src="js/login.js"></script>
</body>
</html>

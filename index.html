<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emicils — Institut & Boutique</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Couleurs — beige dominant, noir en accent */
    --noir: #1d1a16;
    --noir-soft: #2c2823;
    --texte: #34302a;
    --texte-doux: #8c8175;
    --beige-bg: #f4ede2;
    --beige-bg2: #efe6d8;
    --blanc: #fbf8f2;
    --beige-soft: #e9ddca;
    --beige-deep: #ddcdb2;
    --ligne: #e3d8c5;
    --or: #b08d57;          /* accent fidélité / doré chaud */
    --or-soft: #f0e3cf;

    /* Typo */
    --f-display: 'Jost', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --f-serif: 'Cormorant', Georgia, serif;
    --f-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --ls-wide: 0.34em;
    --ls-mid: 0.18em;

    /* Forme */
    --r-sm: 4px;
    --r-md: 8px;
    --r-lg: 14px;
    --r-pill: 999px;
    --shadow: 0 18px 50px -28px rgba(60,45,25,0.45);
    --shadow-soft: 0 10px 30px -22px rgba(60,45,25,0.4);

    /* Densité */
    --gap: 1.5rem;
    --pad-section: clamp(3rem, 7vw, 7rem);
    --maxw: 1280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    font-family: var(--f-body);
    background: var(--beige-bg);
    color: var(--texte);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    width: 100%;
    max-width: 100vw;
  }
  #root { min-height: 100vh; display: flex; flex-direction: column; width: 100%; max-width: 100vw; }
  #root > main { overflow-x: clip; }

  h1,h2,h3,h4 { font-family: var(--f-display); font-weight: 300; line-height: 1.1; color: var(--noir); }
  button { font-family: var(--f-body); cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }
  input, select, textarea { font-family: var(--f-body); font-size: 1rem; }

  ::selection { background: var(--beige-deep); color: var(--noir); }

  /* Utilitaires de marque */
  .eyebrow {
    font-family: var(--f-display);
    text-transform: uppercase;
    letter-spacing: var(--ls-mid);
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--or);
  }
  .wide { letter-spacing: var(--ls-wide); text-transform: uppercase; }

  /* Boutons */
  .btn {
    font-family: var(--f-display);
    text-transform: uppercase;
    letter-spacing: var(--ls-mid);
    font-size: 0.74rem;
    font-weight: 400;
    padding: 0.95em 1.9em;
    border-radius: var(--r-sm);
    display: inline-flex; align-items: center; justify-content: center; gap: 0.6em;
    transition: all .25s ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-dark { background: var(--noir); color: var(--blanc); }
  .btn-dark:hover { background: var(--noir-soft); transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--noir); box-shadow: inset 0 0 0 1px var(--noir); }
  .btn-outline:hover { background: var(--noir); color: var(--blanc); }
  .btn-light { background: var(--blanc); color: var(--noir); box-shadow: inset 0 0 0 1px var(--ligne); }
  .btn-light:hover { background: var(--beige-soft); }
  .btn-block { width: 100%; }

  /* Scrollbar discret */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--beige-deep); border-radius: 999px; border: 3px solid var(--beige-bg); }

  /* Placeholder image produit (photo à fournir) */
  .ph {
    position: relative;
    background:
      repeating-linear-gradient(135deg, rgba(176,141,87,0.05) 0 12px, rgba(176,141,87,0.10) 12px 24px),
      linear-gradient(160deg, var(--beige-soft), var(--beige-deep));
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .ph span {
    font-family: 'Courier New', monospace;
    font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(54,48,42,0.55);
    background: rgba(251,248,242,0.7);
    padding: 4px 9px; border-radius: 999px;
  }

  @keyframes fadeUp { from { transform: translateY(16px);} to { transform:none;} }
  .fade-up { animation: fadeUp .55s ease both; }
  @media (prefers-reduced-motion: reduce) { .fade-up { animation: none; } }

  /* Responsive helpers */
  .container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding-left: clamp(1.1rem, 4vw, 2.5rem); padding-right: clamp(1.1rem, 4vw, 2.5rem); }

  /* ---- Tablette ---- */
  @media (max-width: 980px) {
    [data-hero-grid], [data-cc-grid], [data-loyal-grid], [data-inst-grid],
    [data-pdp-grid], [data-checkout-grid], [data-auth-grid], [data-acc-grid] {
      grid-template-columns: 1fr !important;
    }
    [data-shop-grid] { grid-template-columns: 1fr !important; }
    [data-filters] { position: static !important; }
    [data-gallery] { position: static !important; }
    [data-checkout-grid] aside { position: static !important; }
    [data-hero-grid] { min-height: auto !important; }
    [data-footer-grid] { grid-template-columns: 1fr 1fr !important; }
  }

  /* ---- Mobile ---- */
  @media (max-width: 680px) {
    :root { --pad-section: 3.2rem; }
    .hdr-nav { display: none !important; }
    .hdr-burger { display: grid !important; place-items: center; }
    .hdr-actions { flex: 0 0 auto !important; gap: 0.1rem !important; }
    .hdr-actions button { width: 34px !important; height: 34px !important; }
    .hdr-logo { transform: translateX(-60%) scale(0.75) !important; }
    [data-footer-grid] { grid-template-columns: 1fr !important; gap: 1.8rem !important; }
    [data-order-row] { grid-template-columns: auto 1fr !important; row-gap: 0.8rem !important; }
    [data-order-row] > :nth-child(3), [data-order-row] > :nth-child(4) { grid-column: 2 !important; justify-self: start !important; }
    .galerie-masonry { columns: 1 !important; }
    [data-social-grid] { grid-template-columns: 1fr !important; }
    header, footer, main, section { max-width: 100vw !important; }
    img { max-width: 100% !important; }
    .container { padding-left: 1rem !important; padding-right: 1rem !important; }
  }
  @media (min-width: 681px) and (max-width: 980px) {
    .galerie-masonry { columns: 2 !important; }
  }
</style>
